<!DOCTYPE html>
<html lang="uz" data-theme="dark" data-page-title="titles.lessons">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dars — LevelX</title>
  <link rel="stylesheet" href="./theme.css">
  <link rel="stylesheet" href="./levels-colors.css">
  <link rel="stylesheet" href="./main.css">
  <link rel="stylesheet" href="./pages.css">
  <link rel="stylesheet" href="./lessons.css">
  <script src="./theme-toggle.js" defer></script>
  <script src="./questions-data.js" defer></script>
  <script src="./state.js" defer></script>
  <script src="./i18n.js" defer></script>
  <script src="./lessons-data.js" defer></script>
  <script src="./lesson-player.js" defer></script>
</head>
<body class="player-body">

<header class="player-header">
  <div class="container navbar">
    <a href="index.html" class="logo">
      <div class="logo-icon">EN</div><span>LevelX</span>
    </a>
    <div class="player-breadcrumb">
      <a href="lessons.html">← Darslar</a>
      <span id="player-lesson-title-short" class="breadcrumb-title">Yuklanmoqda...</span>
    </div>
    <div class="nav-actions">
      <div class="lang-switcher" data-lang-switcher>
        <button class="lang-btn" data-lang="uz">UZ</button>
        <button class="lang-btn" data-lang="en">EN</button>
        <button class="lang-btn" data-lang="ru">RU</button>
      </div>
      <button class="theme-toggle" aria-label="Toggle theme"></button>
    </div>
  </div>
</header>

<main class="player-main">

  <!-- Player Layout -->
  <div class="player-layout container">

    <!-- LEFT: Video + Info -->
    <div class="player-left">

      <!-- YouTube Embed -->
      <div class="player-embed-wrap" id="player-embed-wrap">
        <div class="player-embed-placeholder" id="player-placeholder">
          <div class="player-spinner"></div>
        </div>
        <div id="youtube-player-container"></div>
      </div>

      <!-- Player Controls Bar -->
      <div class="player-controls-bar glass-card">
        <div class="player-ctrl-left">
          <button class="player-ctrl-btn" id="btn-prev-lesson" title="Oldingi dars">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="18" height="18">
              <polyline points="15 18 9 12 15 6"/>
            </svg>
          </button>
          <button class="player-ctrl-btn" id="btn-next-lesson" title="Keyingi dars">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="18" height="18">
              <polyline points="9 18 15 12 9 6"/>
            </svg>
          </button>
          <div class="autoplay-toggle">
            <label class="toggle-switch">
              <input type="checkbox" id="autoplay-toggle" checked>
              <span class="toggle-slider"></span>
            </label>
            <span>Avtomatik davom</span>
          </div>
        </div>
        <div class="player-ctrl-right">
          <button class="player-ctrl-btn" id="btn-bookmark" title="Bookmark qo'shish">
            🔖 <span>Bookmark</span>
          </button>
          <button class="player-ctrl-btn completed-btn" id="btn-complete" title="Tugatildi deb belgilash">
            ✅ <span id="complete-label">Tugatdim</span>
          </button>
          <button class="player-ctrl-btn fav-btn" id="btn-favorite" title="Sevimlilarga qo'shish">
            🤍 <span id="fav-label">Saqlash</span>
          </button>
        </div>
      </div>

      <!-- Lesson Info -->
      <div class="player-lesson-info glass-card">
        <div class="player-lesson-meta">
          <span class="lvl-badge" id="player-level-badge">B1</span>
          <div class="skill-tags" id="player-skill-tags"></div>
          <span class="player-views" id="player-views">0 ko'rishlar</span>
          <span class="player-date" id="player-date"></span>
        </div>
        <h1 class="player-lesson-title" id="player-lesson-title">Yuklanmoqda...</h1>
        <div class="player-teacher-row">
          <div class="player-teacher-avatar" id="player-teacher-avatar">👨‍🏫</div>
          <div>
            <div class="player-teacher-name" id="player-teacher-name">O'qituvchi</div>
            <a class="player-channel-link" id="player-channel-link" href="#" target="_blank">YouTube kanalga o'tish ↗</a>
          </div>
        </div>
        <p class="player-description" id="player-description"></p>
        <div class="player-progress-wrap">
          <div class="player-progress-bar">
            <div class="player-progress-fill" id="player-progress-fill" style="width:0%"></div>
          </div>
          <span id="player-progress-label">0% tugatildi</span>
        </div>
      </div>

      <!-- Bookmarks -->
      <div class="player-panel glass-card" id="bookmarks-panel">
        <div class="panel-header">
          <h3>🔖 Bookmarklar</h3>
          <button class="panel-add-btn" id="add-bookmark-btn">+ Hozirgi vaqtni qo'shish</button>
        </div>
        <div class="bookmarks-list" id="bookmarks-list">
          <p class="empty-panel-msg">Hali bookmark qo'shilmagan.</p>
        </div>
      </div>

      <!-- Notes -->
      <div class="player-panel glass-card" id="notes-panel">
        <div class="panel-header">
          <h3>📝 Eslatmalar</h3>
          <button class="panel-action-btn" id="download-notes-btn">⬇ Yuklab olish</button>
        </div>
        <textarea class="notes-textarea" id="notes-textarea" placeholder="Bu dars haqida eslatmalar yozing..."></textarea>
        <div class="notes-toolbar">
          <button class="btn btn-primary btn-sm" id="save-notes-btn">Saqlash</button>
          <span class="notes-saved-msg" id="notes-saved-msg"></span>
        </div>
      </div>

    </div>

    <!-- RIGHT: Playlist Sidebar -->
    <div class="player-right">
      <div class="playlist-sidebar glass-card">
        <div class="playlist-header">
          <h3>📋 Dars ro'yxati</h3>
          <span id="playlist-count">0 dars</span>
        </div>
        <div class="playlist-search-wrap">
          <input type="text" class="playlist-search" id="playlist-search" placeholder="Ro'yxatda qidirish...">
        </div>
        <div class="playlist-items" id="playlist-items">
          <!-- Populated by JS -->
        </div>
      </div>
    </div>

  </div>
</main>

</body>
</html>
