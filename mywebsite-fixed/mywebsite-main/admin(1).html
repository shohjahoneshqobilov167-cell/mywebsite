<!DOCTYPE html>
<html lang="uz" data-theme="light" data-page-title="titles.admin">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel - LevelX</title>
  
  <!-- CSS Stylesheets -->
  <link rel="stylesheet" href="./theme.css">
  <link rel="stylesheet" href="./levels-colors.css">
  <link rel="stylesheet" href="./main.css">
  <link rel="stylesheet" href="./pages.css">
  
  <!-- Core JS scripts -->
  <script src="./theme-toggle.js" defer></script>
  <script src="./questions-data.js" defer></script>
  <script src="./state.js" defer></script>
  <script src="./i18n.js" defer></script>
  <script src="./admin.js" defer></script>
</head>
<body>

  <!-- Navigation Header -->
  <header>
    <div class="container navbar">
      <a href="index.html" class="logo">
        <div class="logo-icon">EN</div>
        <span>LevelX</span>
      </a>
      
      <nav>
        <ul class="nav-links">
          <li><a href="index.html" data-i18n="nav.home"></a></li>
          <li><a href="levels.html" data-i18n="nav.levels"></a></li>
          <li><a href="stats.html" data-i18n="nav.stats"></a></li>
          <li><a href="admin.html" class="active" data-i18n="nav.admin"></a></li>
        </ul>
      </nav>
      
      <div class="nav-actions">
        <div class="lang-switcher" data-lang-switcher>
          <button class="lang-btn" data-lang="uz">UZ</button>
          <button class="lang-btn" data-lang="en">EN</button>
          <button class="lang-btn" data-lang="ru">RU</button>
        </div>
        <button class="theme-toggle" aria-label="Mavzuni o'zgartirish / Change theme / Сменить тему"></button>
        <a href="profile.html" class="btn btn-secondary btn-sm" data-i18n="nav.profile"></a>
      </div>
    </div>
  </header>

  <main class="container" style="margin-top: 30px; margin-bottom: 50px;">
    <div class="animate-fade-in">
      
      <!-- Top Action bar -->
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 15px;">
        <div>
          <h1 data-i18n="admin.title"></h1>
          <p style="color: var(--text-secondary);" id="question-count-label">Jami savollar soni: 0 ta / Total questions: 0 / Всего вопросов: 0</p>
        </div>
        
        <div style="display: flex; gap: 10px;">
          <button onclick="triggerResetQuestions()" class="btn btn-secondary" data-i18n="admin.reset"></button>
          <button onclick="openQuestionModal()" class="btn btn-primary" data-i18n="admin.add"></button>
        </div>
      </div>

      <!-- Questions List Card -->
      <div class="card" style="overflow-x: auto; padding: 0;">
        <table class="admin-table">
          <thead>
            <tr>
              <th>ID</th>
              <th data-i18n="admin.tableCategory"></th>
              <th data-i18n="admin.tableLevel"></th>
              <th data-i18n="admin.tableQuestion"></th>
              <th data-i18n="admin.tableOptions"></th>
              <th style="width: 150px; text-align: center;" data-i18n="admin.tableActions"></th>
            </tr>
          </thead>
          <tbody id="admin-questions-tbody">
            <!-- Populated by JS -->
          </tbody>
        </table>
      </div>

    </div>
  </main>

  <!-- ADD / EDIT QUESTION MODAL -->
  <div class="modal" id="question-editor-modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="modal-form-title" data-i18n="admin.modalTitle"></h3>
        <button onclick="closeQuestionModal()" class="modal-close">&times;</button>
      </div>
      
      <form id="form-question-editor" onsubmit="handleSaveQuestion(event)">
        <input type="hidden" id="edit-question-id">
        
        <div class="grid-2">
          <div class="form-group">
            <label for="edit-category" data-i18n="admin.categoryLabel"></label>
            <select id="edit-category" class="form-control" required>
              <option value="grammar">Grammatika (Grammar)</option>
              <option value="vocabulary">Lug'at boyligi (Vocabulary)</option>
              <option value="reading">O'qib tushunish (Reading)</option>
            </select>
          </div>
          <div class="form-group">
            <label for="edit-difficulty" data-i18n="admin.difficultyLabel"></label>
            <select id="edit-difficulty" class="form-control" required>
              <option value="A1">A1</option>
              <option value="A2">A2</option>
              <option value="B1">B1</option>
              <option value="B2">B2</option>
              <option value="C1">C1</option>
              <option value="C2">C2</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label for="edit-passage" data-i18n="admin.passageLabel"></label>
          <textarea id="edit-passage" class="form-control" rows="3" placeholder="Faqat o'qib tushunish savollariga tegishli matn..."></textarea>
        </div>

        <div class="form-group">
          <label for="edit-question" data-i18n="admin.questionLabel"></label>
          <textarea id="edit-question" class="form-control" rows="2" placeholder="Masalan: She ___ a doctor." required></textarea>
        </div>

        <div class="grid-2">
          <div class="form-group">
            <label for="edit-opt-0" data-i18n="admin.optionA"></label>
            <input type="text" id="edit-opt-0" class="form-control" required>
          </div>
          <div class="form-group">
            <label for="edit-opt-1" data-i18n="admin.optionB"></label>
            <input type="text" id="edit-opt-1" class="form-control" required>
          </div>
        </div>

        <div class="grid-2">
          <div class="form-group">
            <label for="edit-opt-2" data-i18n="admin.optionC"></label>
            <input type="text" id="edit-opt-2" class="form-control" required>
          </div>
          <div class="form-group">
            <label for="edit-opt-3" data-i18n="admin.optionD"></label>
            <input type="text" id="edit-opt-3" class="form-control" required>
          </div>
        </div>

        <div class="form-group">
          <label for="edit-correct-index" data-i18n="admin.correctLabel"></label>
          <select id="edit-correct-index" class="form-control" required>
            <option value="0">Variant A</option>
            <option value="1">Variant B</option>
            <option value="2">Variant C</option>
            <option value="3">Variant D</option>
          </select>
        </div>

        <div style="display: flex; gap: 10px; justify-content: flex-end; margin-top: 25px; border-top: 1px solid var(--border-color); padding-top: 15px;">
          <button type="button" onclick="closeQuestionModal()" class="btn btn-secondary btn-sm" data-i18n="common.cancel"></button>
          <button type="submit" class="btn btn-primary btn-sm" data-i18n="common.save"></button>
        </div>
      </form>
    </div>
  </div>

  <!-- Footer -->
  <footer>
    <div class="container footer-content">
      <p>&copy; 2026 LevelX Project. Barcha huquqlar himoyalangan.</p>
    </div>
  </footer>

</body>
</html>
